# Lint gates test: fail fast on style issues before spending time on a
# test run that needs a database.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.4.4
      - run: ruff check . && ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
    env:
      MONGO_URI_TEST: mongodb://localhost:27017/musiccatalog_test
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
